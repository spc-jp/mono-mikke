<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>モノみっけ | Mono-mikke</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;700&family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #223670;
  --navy-dark: #172550;
  --gold: #D0A900;
  --gold-light: #f0c820;
  --cream: #faf7f2;
  --warm-white: #fff9ef;
  --text: #2a2a2a;
  --muted: #7a7a7a;
  --border: rgba(208,169,0,0.3);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--cream);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* HEADER */
header { background: var(--navy); position: relative; overflow: hidden; }
header::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(208,169,0,0.12) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(255,255,255,0.04) 0%, transparent 50%);
}
.header-inner { position: relative; padding: 24px 20px 20px; text-align: center; }
.header-jp { font-family: 'Noto Serif JP', serif; font-size: 1.6rem; font-weight: 600; color: #fff; letter-spacing: 0.2em; }
.header-en { font-family: 'Cormorant Garamond', serif; font-size: 0.9rem; font-weight: 300; color: var(--gold); letter-spacing: 0.3em; margin-top: 4px; font-style: italic; }
.header-sub { font-size: 0.7rem; color: rgba(255,255,255,0.5); margin-top: 10px; }
.gold-line { height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin-top: 16px; }

/* LANG BAR */
.lang-bar {
  background: var(--warm-white);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex; justify-content: center; gap: 6px; flex-wrap: wrap;
}
.lang-btn {
  padding: 6px 14px; border-radius: 20px; border: 1.5px solid #ddd;
  background: white; font-size: 0.8rem; cursor: pointer; transition: all 0.25s;
  font-family: 'Noto Sans JP', sans-serif; color: var(--muted);
}
.lang-btn:hover { border-color: var(--gold); color: var(--navy); }
.lang-btn.active { background: var(--navy); border-color: var(--navy); color: white; font-weight: 700; }

/* MAIN */
.main { max-width: 480px; margin: 0 auto; padding: 24px 16px 40px; }

/* UPLOAD */
.upload-area {
  background: white; border: 2px dashed var(--border); border-radius: 16px;
  padding: 36px 20px; text-align: center; cursor: pointer; transition: all 0.25s; margin-bottom: 16px;
}
.upload-area:hover { border-color: var(--gold); background: #fffbf0; }
.upload-icon-wrap {
  width: 64px; height: 64px;
  background: linear-gradient(135deg, var(--navy) 0%, #2d4a9e 100%);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  margin: 0 auto 14px; font-size: 1.6rem; box-shadow: 0 4px 16px rgba(34,54,112,0.25);
}
.upload-label { font-size: 0.95rem; color: var(--navy); font-weight: 700; margin-bottom: 4px; }
.upload-sublabel { font-size: 0.75rem; color: var(--muted); }
#fileInput { display: none; }

/* PREVIEW + SCANNER */
#previewArea { display: none; margin-bottom: 16px; position: relative; border-radius: 16px; overflow: hidden; }
#preview { width: 100%; border-radius: 16px; max-height: 280px; object-fit: cover; box-shadow: 0 4px 20px rgba(0,0,0,0.12); display: block; }

.scanner-overlay { position: absolute; inset: 0; border-radius: 16px; pointer-events: none; opacity: 0; transition: opacity 0.3s; }
.scanner-overlay.active { opacity: 1; }
.scan-dim { position: absolute; inset: 0; background: rgba(34,54,112,0.18); border-radius: 16px; }
.scan-line {
  position: absolute; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, transparent 0%, rgba(208,169,0,0.5) 20%, rgba(255,220,50,1) 50%, rgba(208,169,0,0.5) 80%, transparent 100%);
  box-shadow: 0 0 12px 4px rgba(208,169,0,0.5);
  animation: scanDown 1.8s ease-in-out infinite;
}
@keyframes scanDown {
  0%   { top: 0%; }
  50%  { top: calc(100% - 3px); }
  100% { top: 0%; }
}
.scanner-corner { position: absolute; width: 20px; height: 20px; border-color: var(--gold); border-style: solid; opacity: 0.9; }
.corner-tl { top: 8px; left: 8px; border-width: 2px 0 0 2px; }
.corner-tr { top: 8px; right: 8px; border-width: 2px 2px 0 0; }
.corner-bl { bottom: 8px; left: 8px; border-width: 0 0 2px 2px; }
.corner-br { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; }
.scan-label {
  position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
  font-size: 0.7rem; color: var(--gold); letter-spacing: 0.2em;
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  animation: pulse 1s ease-in-out infinite; white-space: nowrap;
}
@keyframes pulse { 0%,100%{opacity:0.5;} 50%{opacity:1;} }

.retake-btn {
  display: block; width: 100%; padding: 8px; text-align: center;
  font-size: 0.75rem; color: var(--muted); cursor: pointer; margin-top: 8px; border: none; background: none;
}
.retake-btn:hover { color: var(--navy); }

/* ANALYZE BTN */
.analyze-btn {
  display: none; width: 100%; padding: 18px;
  background: linear-gradient(135deg, var(--gold) 0%, #b89300 100%);
  color: var(--navy); border: none; border-radius: 12px; font-size: 1rem; font-weight: 700;
  cursor: pointer; letter-spacing: 0.05em; transition: all 0.25s;
  font-family: 'Noto Sans JP', sans-serif; box-shadow: 0 4px 16px rgba(208,169,0,0.35);
}
.analyze-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(208,169,0,0.45); }
.analyze-btn:disabled { opacity: 0.55; cursor: not-allowed; }

/* LOADING */
.loading { display: none; text-align: center; padding: 32px 20px; }
.loading-ring {
  width: 48px; height: 48px; border: 3px solid rgba(208,169,0,0.2);
  border-top: 3px solid var(--gold); border-radius: 50%;
  animation: spin 0.9s ease-in-out infinite; margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 0.85rem; color: var(--muted); line-height: 1.6; white-space: pre-wrap; }

/* RESULT TABS */
.result-tabs { display: none; margin-top: 16px; }
.tab-bar { display: flex; border-bottom: 2px solid var(--border); }
.tab-btn {
  flex: 1; padding: 10px 4px; background: none; border: none;
  border-bottom: 2px solid transparent; margin-bottom: -2px;
  font-size: 0.75rem; color: var(--muted); cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif; transition: all 0.2s; text-align: center;
}
.tab-btn.active { color: var(--navy); border-bottom-color: var(--navy); font-weight: 700; }
.tab-content { display: none; }
.tab-content.active { display: block; animation: fadeUp 0.35s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }

.result-card { background: white; border-radius: 0 0 16px 16px; overflow: hidden; box-shadow: 0 4px 24px rgba(34,54,112,0.1); }
.result-header { background: var(--navy); padding: 12px 18px; display: flex; align-items: center; gap: 8px; }
.result-header-label { font-family: 'Cormorant Garamond', serif; font-size: 0.85rem; color: var(--gold); letter-spacing: 0.2em; text-transform: uppercase; }
.result-body { padding: 20px 18px 24px; border-left: 3px solid var(--gold); }
.result-text { font-family: 'Noto Serif JP', serif; font-size: 0.93rem; line-height: 2; color: var(--text); white-space: pre-wrap; min-height: 60px; }
.sub-text { font-size: 0.88rem; line-height: 1.9; color: var(--text); white-space: pre-wrap; min-height: 60px; }

/* タイプライターカーソル */
.cursor { display: inline-block; width: 2px; height: 1em; background: var(--gold); margin-left: 2px; vertical-align: text-bottom; animation: blink 0.7s step-end infinite; }
@keyframes blink { 50%{opacity:0;} }

/* COPY BTN */
.copy-btn {
  margin-top: 12px; padding: 8px 18px; background: var(--navy); color: white;
  border: none; border-radius: 8px; font-size: 0.78rem; cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif; transition: all 0.2s;
}
.copy-btn:hover { background: #2d4a9e; }
.copy-btn.copied { background: #3a8a3a; }

/* TRIAL */
.trial-badge { text-align: center; font-size: 0.75rem; color: var(--muted); margin-top: 14px; }
.trial-badge .count-highlight { color: var(--navy); font-weight: 700; font-size: 0.95rem; }

/* PAYWALL */
.paywall {
  display: none; background: var(--navy); border-radius: 16px;
  padding: 28px 20px; text-align: center; margin-top: 20px; position: relative; overflow: hidden;
}
.paywall::before { content:''; position:absolute; inset:0; background: radial-gradient(ellipse at 50% 0%, rgba(208,169,0,0.15), transparent 70%); }
.paywall-icon { font-size: 2rem; margin-bottom: 10px; position: relative; }
.paywall-title { font-family: 'Noto Serif JP', serif; font-size: 1.1rem; color: white; margin-bottom: 8px; position: relative; }
.paywall-text { font-size: 0.82rem; color: rgba(255,255,255,0.65); line-height: 1.7; margin-bottom: 18px; position: relative; white-space: pre-wrap; }
.paywall-btn { padding: 14px 28px; background: var(--gold); color: var(--navy); border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 700; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; position: relative; }

/* BOTTOM SHEET */
.sheet-backdrop {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 100;
  animation: fadeIn 0.2s ease;
}
.sheet-backdrop.open { display: block; }
@keyframes fadeIn { from{opacity:0;} to{opacity:1;} }

.bottom-sheet {
  position: fixed; left: 0; right: 0; bottom: 0;
  background: white;
  border-radius: 20px 20px 0 0;
  padding: 0 0 env(safe-area-inset-bottom, 16px);
  z-index: 101;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
  max-width: 480px;
  margin: 0 auto;
}
.bottom-sheet.open { transform: translateY(0); }

.sheet-handle {
  width: 36px; height: 4px;
  background: #ddd; border-radius: 2px;
  margin: 12px auto 8px;
}
.sheet-title {
  font-size: 0.8rem; color: var(--muted);
  text-align: center; padding: 4px 0 12px;
  border-bottom: 1px solid #f0f0f0;
}
.sheet-item {
  display: flex; align-items: center; gap: 16px;
  padding: 16px 24px;
  cursor: pointer;
  border: none; background: none; width: 100%;
  text-align: left; font-family: 'Noto Sans JP', sans-serif;
  transition: background 0.15s;
  border-bottom: 1px solid #f8f8f8;
}
.sheet-item:hover { background: #fafaf5; }
.sheet-item:last-child { border-bottom: none; }
.sheet-item-icon {
  width: 44px; height: 44px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem; flex-shrink: 0;
}
.icon-library  { background: linear-gradient(135deg, #34aadc, #1c7fc5); }
.icon-camera   { background: linear-gradient(135deg, #ff6b6b, #cc3333); }
.icon-file     { background: linear-gradient(135deg, #6bcb77, #3a9e4b); }
.icon-drive    { background: linear-gradient(135deg, #fbbc04, #ea4335); }

.sheet-item-text { line-height: 1.3; }
.sheet-item-label { font-size: 0.95rem; color: var(--text); font-weight: 500; }
.sheet-item-sub   { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

.sheet-cancel {
  display: block; width: 100%; padding: 14px;
  background: #f5f5f5; border: none; border-radius: 12px;
  font-size: 0.9rem; color: var(--muted); cursor: pointer;
  margin: 8px 16px 16px; width: calc(100% - 32px);
  font-family: 'Noto Sans JP', sans-serif;
  transition: background 0.15s;
}
.sheet-cancel:hover { background: #ebebeb; }

canvas { display: none; }
footer { text-align: center; padding: 24px 16px; font-size: 0.65rem; color: rgba(34,54,112,0.35); letter-spacing: 0.08em; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-jp">📸 モノみっけ</div>
    <div class="header-en">Mono-mikke · Discover the Story</div>
    <div class="header-sub">商品を撮るだけで、生産者のストーリーが届く</div>
  </div>
  <div class="gold-line"></div>
</header>

<div class="lang-bar">
  <button class="lang-btn active" data-lang="ja">🇯🇵 日本語</button>
  <button class="lang-btn" data-lang="en">🇺🇸 English</button>
  <button class="lang-btn" data-lang="zh">🇨🇳 中文(簡)</button>
  <button class="lang-btn" data-lang="ko">🇰🇷 한국어</button>
</div>

<div class="main">

  <div class="upload-area" id="uploadArea">
    <div class="upload-icon-wrap">📷</div>
    <div class="upload-label" id="uploadLabel">商品を撮影する</div>
    <div class="upload-sublabel" id="uploadSublabel">タップして写真を選択・撮影</div>
  </div>

  <input type="file" id="fileInputLibrary" accept="image/*" style="display:none">
  <input type="file" id="fileInputCamera"  accept="image/*" capture="environment" style="display:none">
  <input type="file" id="fileInputFile"    accept="image/*" style="display:none">

  <div class="sheet-backdrop" id="sheetBackdrop"></div>
  <div class="bottom-sheet" id="bottomSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheetTitle">画像を選択</div>
    <button class="sheet-item" id="sheetItemLibrary" onclick="pickLibrary()">
      <div class="sheet-item-icon icon-library">🖼</div>
      <div class="sheet-item-text">
        <div class="sheet-item-label" id="sheetLibrary">写真のライブラリー</div>
        <div class="sheet-item-sub" id="sheetLibrarySub">カメラロールから選ぶ</div>
      </div>
    </button>
    <button class="sheet-item" id="sheetItemCamera" onclick="pickCamera()">
      <div class="sheet-item-icon icon-camera">📷</div>
      <div class="sheet-item-text">
        <div class="sheet-item-label" id="sheetCamera">写真を撮る</div>
        <div class="sheet-item-sub" id="sheetCameraSub">カメラを起動して撮影</div>
      </div>
    </button>
    <button class="sheet-item" id="sheetItemFile" onclick="pickFile()">
      <div class="sheet-item-icon icon-file">📁</div>
      <div class="sheet-item-text">
        <div class="sheet-item-label" id="sheetFile">ファイルを選択</div>
        <div class="sheet-item-sub" id="sheetFileSub">端末内のファイルから</div>
      </div>
    </button>
    <button class="sheet-item" id="sheetItemDrive" onclick="pickDrive()">
      <div class="sheet-item-icon icon-drive">▲</div>
      <div class="sheet-item-text">
        <div class="sheet-item-label" id="sheetDrive">Googleドライブ</div>
        <div class="sheet-item-sub" id="sheetDriveSub">ドライブを開いて画像をダウンロード後に選択</div>
      </div>
    </button>
    <button class="sheet-cancel" id="sheetCancel">キャンセル</button>
  </div>

  <div id="previewArea">
    <img id="preview" alt="preview">
    <div class="scanner-overlay" id="scannerOverlay">
      <div class="scan-dim"></div>
      <div class="scan-line"></div>
      <div class="scanner-corner corner-tl"></div>
      <div class="scanner-corner corner-tr"></div>
      <div class="scanner-corner corner-bl"></div>
      <div class="scanner-corner corner-br"></div>
      <div class="scan-label" id="scanLabel">SCANNING...</div>
    </div>
    <button class="retake-btn" id="retakeBtn">🔄 撮り直す</button>
  </div>

  <button class="analyze-btn" id="analyzeBtn">✨ ストーリーを読み解く</button>

  <div class="loading" id="loading">
    <div class="loading-ring"></div>
    <div class="loading-text" id="loadingText">AIが商品のストーリーを読み解いています...</div>
  </div>

  <div class="result-tabs" id="resultTabs">
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="story" id="tabStory">📖 ストーリー</button>
      <button class="tab-btn" data-tab="pairing" id="tabPairing">🍽 ペアリング</button>
      <button class="tab-btn" data-tab="sns" id="tabSns">📲 SNS投稿文</button>
    </div>
    <div class="result-card">
      <div class="tab-content active" id="tab-story">
        <div class="result-header">
          <span style="color:var(--gold)">✦</span>
          <span class="result-header-label" id="labelStory">商品ストーリー</span>
        </div>
        <div class="result-body">
          <div class="result-text" id="resultStory"></div>
        </div>
      </div>
      <div class="tab-content" id="tab-pairing">
        <div class="result-header">
          <span style="color:var(--gold)">✦</span>
          <span class="result-header-label" id="labelPairing">ペアリング提案</span>
        </div>
        <div class="result-body">
          <div class="sub-text" id="resultPairing"></div>
        </div>
      </div>
      <div class="tab-content" id="tab-sns">
        <div class="result-header">
          <span style="color:var(--gold)">✦</span>
          <span class="result-header-label" id="labelSns">SNS投稿文</span>
        </div>
        <div class="result-body">
          <div class="sub-text" id="resultSns"></div>
          <button class="copy-btn" id="copyBtn" onclick="copySns()">📋 コピーする</button>
        </div>
      </div>
    </div>
  </div>

  <div class="trial-badge" id="trialBadge"></div>

  <div class="paywall" id="paywall">
    <div class="paywall-icon">🔓</div>
    <div class="paywall-title" id="paywallTitle">無料体験が終了しました</div>
    <div class="paywall-text" id="paywallText">3回の無料体験をお使いいただきました。続けてご利用いただくには、店舗スタッフまでお声がけください。</div>
    <button class="paywall-btn" id="paywallBtn" onclick="contactStore()">スタッフに声をかける</button>
  </div>

</div>

<canvas id="canvas"></canvas>
<footer>Powered by Smile Plus Consulting &nbsp;|&nbsp; モノみっけ &nbsp;©2025</footer>

<script>

  },
  ko: {
    uploadLabel:'상품을 촬영하세요', uploadSub:'탭하여 사진 촬영 또는 이미지 선택',
    analyzeBtn:'✨ 스토리 보기', loadingText:'AI가 이 상품의\n이야기를 읽고 있습니다...',
    scanLabel:'스캔 중...', tabStory:'📖 스토리', tabPairing:'🍽 페어링', tabSns:'📲 SNS 문구',
    labelStory:'상품 스토리', labelPairing:'페어링 제안', labelSns:'SNS 캡션',
    copyBtn:'📋 복사하기', copied:'✅ 복사됨', retake:'🔄 다시 찍기',
    trialLeft:(n)=>`무료 체험: <span class="count-highlight">${n}</span>회 남았습니다`,
    trialEnd:'무료 체험이 종료되었습니다', paywallTitle:'무료 체험 종료',
    paywallText:'3회의 무료 체험을 모두 사용하셨습니다.\n계속 이용하시려면 직원에게 문의해 주세요.',
    paywallBtn:'직원에게 문의하기', contactMsg:'직원에게 문의하시거나 QR코드 옆 연락처로 연락해 주세요.',
    errorMsg:'오류가 발생했습니다. 다시 시도해 주세요.',
  }
};

let currentLang = 'ja';
let currentImageBase64 = null;

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentLang = btn.dataset.lang;
    applyLang();
    if (currentImageBase64) document.getElementById('resultTabs').style.display = 'none';
  });
});

function applyLang() {
  const t = i18n[currentLang];
  document.getElementById('uploadLabel').textContent    = t.uploadLabel;
  document.getElementById('uploadSublabel').textContent = t.uploadSub;
  document.getElementById('analyzeBtn').textContent     = t.analyzeBtn;
  document.getElementById('retakeBtn').textContent      = t.retake;
  document.getElementById('scanLabel').textContent      = t.scanLabel;
  document.getElementById('tabStory').textContent       = t.tabStory;
  document.getElementById('tabPairing').textContent     = t.tabPairing;
  document.getElementById('tabSns').textContent         = t.tabSns;
  document.getElementById('labelStory').textContent     = t.labelStory;
  document.getElementById('labelPairing').textContent   = t.labelPairing;
  document.getElementById('labelSns').textContent       = t.labelSns;
  document.getElementById('copyBtn').textContent        = t.copyBtn;
  document.getElementById('paywallTitle').textContent   = t.paywallTitle;
  document.getElementById('paywallText').textContent    = t.paywallText;
  document.getElementById('paywallBtn').textContent     = t.paywallBtn;
  const count = getCount();
  if (count > 0) updateTrialBadge(count);
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

// ボトムシート
document.getElementById('uploadArea').addEventListener('click', openSheet);
document.getElementById('retakeBtn').addEventListener('click', openSheet);
document.getElementById('sheetBackdrop').addEventListener('click', closeSheet);
document.getElementById('sheetCancel').addEventListener('click', closeSheet);

function openSheet() {
  document.getElementById('sheetBackdrop').classList.add('open');
  document.getElementById('bottomSheet').classList.add('open');
}
function closeSheet() {
  document.getElementById('sheetBackdrop').classList.remove('open');
  document.getElementById('bottomSheet').classList.remove('open');
}
function pickLibrary() { closeSheet(); setTimeout(() => document.getElementById('fileInputLibrary').click(), 250); }
function pickCamera()  { closeSheet(); setTimeout(() => document.getElementById('fileInputCamera').click(), 250); }
function pickFile()    { closeSheet(); setTimeout(() => document.getElementById('fileInputFile').click(), 250); }
function pickDrive() {
  closeSheet();
  window.open('https://drive.google.com', '_blank');
  setTimeout(() => {
    alert('Googleドライブで画像を保存後、「ファイルを選択」から選んでください。\nAfter saving from Drive, use "Choose File" to select it.');
  }, 400);
}

['fileInputLibrary','fileInputCamera','fileInputFile'].forEach(id => {
  document.getElementById(id).addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    processImage(file);
    e.target.value = '';
  });
});

function processImage(file) {
  const img = new Image();
  const objectURL = URL.createObjectURL(file);
  img.onload = () => {
    const canvas = document.getElementById('canvas');
    let w = img.naturalWidth, h = img.naturalHeight;
    if (w > 1280) { h = Math.round(h * 1280 / w); w = 1280; }
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    currentImageBase64 = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];
    URL.revokeObjectURL(objectURL);
    document.getElementById('preview').src = canvas.toDataURL('image/jpeg', 0.85);
    document.getElementById('previewArea').style.display  = 'block';
    document.getElementById('analyzeBtn').style.display   = 'block';
    document.getElementById('resultTabs').style.display   = 'none';
    document.getElementById('uploadArea').style.display   = 'none';
  };
  img.src = objectURL;
}

document.getElementById('analyzeBtn').addEventListener('click', () => {
  if (getCount() >= FREE_LIMIT) { document.getElementById('paywall').style.display = 'block'; return; }
  analyze();
});

async function analyze() {
  const t   = i18n[currentLang];
  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  document.getElementById('loading').style.display    = 'block';
  document.getElementById('loadingText').textContent  = t.loadingText;
  document.getElementById('resultTabs').style.display = 'none';
  startScanner();

  try {
    const res  = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: currentImageBase64, language: currentLang })
    });
    const data = await res.json();

    if (data.story) {
      const newCount = getCount() + 1;
      setCount(newCount);
      stopScanner();
      document.getElementById('loading').style.display = 'none';

      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById('tabStory').classList.add('active');
      document.getElementById('tab-story').classList.add('active');
      document.getElementById('resultTabs').style.display = 'block';

      typewriter('resultStory',   data.story   || '', 20);
      typewriter('resultPairing', data.pairing || '', 20);
      document.getElementById('resultSns').textContent = data.sns || '';

      document.getElementById('resultTabs').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      updateTrialBadge(newCount);
      if (newCount >= FREE_LIMIT) {
        setTimeout(() => { document.getElementById('paywall').style.display = 'block'; }, 1500);
      }
    } else {
      stopScanner();
      alert(t.errorMsg);
    }
  } catch (err) {
    stopScanner();
    console.error(err);
    alert(t.errorMsg);
  } finally {
    btn.disabled = false;
    document.getElementById('loading').style.display = 'none';
  }
}

function startScanner() { document.getElementById('scannerOverlay').classList.add('active'); }
function stopScanner()  { document.getElementById('scannerOverlay').classList.remove('active'); }

function typewriter(elementId, text, speed = 20) {
  const el = document.getElementById(elementId);
  el.innerHTML = '';
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  el.appendChild(cursor);
  let i = 0;
  const timer = setInterval(() => {
    if (i < text.length) { cursor.insertAdjacentText('beforebegin', text[i]); i++; }
    else { clearInterval(timer); cursor.remove(); }
  }, speed);
}

function copySns() {
  const t    = i18n[currentLang];
  const btn  = document.getElementById('copyBtn');
  const text = document.getElementById('resultSns').textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = t.copied;
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = t.copyBtn; btn.classList.remove('copied'); }, 2000);
  });
}

function getCount() { return parseInt(localStorage.getItem(STORAGE_KEY) || '0'); }
function setCount(n) { localStorage.setItem(STORAGE_KEY, n.toString()); }
function updateTrialBadge(count) {
  const badge = document.getElementById('trialBadge');
  const rem   = FREE_LIMIT - count;
  badge.innerHTML = rem > 0 ? i18n[currentLang].trialLeft(rem) : i18n[currentLang].trialEnd;
}
function contactStore() {
  if (CONTACT_URL) window.open(CONTACT_URL, '_blank');
  else alert(i18n[currentLang].contactMsg);
}

const initCount = getCount();
if (initCount >= FREE_LIMIT) document.getElementById('paywall').style.display = 'block';
if (initCount > 0) updateTrialBadge(initCount);
</script>
